name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - master
    paths:
      # 只有 Worker 代码变更时才触发
      - 'infra/cloudflare-worker/**'
      - 'infra/cloudflare-trans-router/**'
  workflow_dispatch:
    # 支持手动触发

jobs:
  deploy-worker:
    strategy:
      fail-fast: false
      matrix:
        worker:
          - name: SPA Router Worker
            workingDirectory: 'infra/cloudflare-worker'
          - name: Storage Proxy Worker
            workingDirectory: 'infra/cloudflare-trans-router'
    runs-on: ubuntu-latest
    name: Deploy ${{ matrix.worker.name }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.worker.workingDirectory }}
          command: deploy
