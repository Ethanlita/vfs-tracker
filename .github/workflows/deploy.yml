name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

# 设置GITHUB_TOKEN权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，跳过正在运行的队列
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci



      - name: Build project
        run: npm run build
        env:
          VITE_GOOGLE_GEMINI_API: ${{ secrets.GOOGLE_GEMINI_API }}
          # AWS Cognito 配置
          VITE_COGNITO_USER_POOL_ID: ${{secrets.COGNITO_USER_POOL_ID}}
          VITE_COGNITO_USER_POOL_WEB_CLIENT_ID: ${{secrets.COGNITO_USER_POOL_WEB_CLIENT_ID}}
          VITE_AWS_REGION: ${{secrets.AWS_REGION}}

          # API Gateway 配置
          VITE_API_ENDPOINT: ${{secrets.API_ENDPOINT}}
          VITE_API_STAGE: ${{secrets.API_STAGE}}

          # S3 存储配置
          VITE_S3_BUCKET: ${{secrets.S3_BUCKET}}


      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy-esa:
    name: Deploy ESA EdgeRoutine and purge .cn cache
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Alibaba Cloud CLI
        run: /bin/bash -c "$(curl -fsSL https://aliyuncli.alicdn.com/install.sh)"

      - name: Configure Alibaba Cloud CLI
        run: |
          aliyun configure set \
            --profile default \
            --mode AK \
            --access-key-id "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
            --access-key-secret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
            --region "cn-hangzhou"
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}

      - name: Deploy ESA EdgeRoutine
        run: node scripts/deploy-esa-routine.mjs
        env:
          ESA_ROUTINE_NAME: vfstrackercn
          ESA_ROUTINE_CODE: infra/esa-routine/cn-spa-fallback.js
          ESA_ROUTINE_ENV: production

      - name: Purge ESA entry cache
        run: node scripts/purge-esa-cache.mjs
        env:
          ESA_SITE_ID: '929690936461856'
